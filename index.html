<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ray-Trace Studio — Vector Export System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07080d;
    --panel: rgba(16, 18, 28, 0.88);
    --border: rgba(100, 130, 200, 0.16);
    --border-hi: rgba(100, 160, 240, 0.4);
    --accent: #4a9eff;
    --amber: #ffb84a;
    --purple: #cc44ff;
    --danger: #ff4466;
    --success: #44dd88;
    --text: #e8eaf2;
    --text-mid: #a0a6b8;
    --text-dim: #5a607a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg); color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    user-select: none; -webkit-user-select: none;
  }
  canvas { display: block; }
  
  .ui-element { transition: opacity 0.3s ease, transform 0.3s ease; }
  body.hide-ui .ui-element {
    opacity: 0 !important; pointer-events: none !important; transform: scale(0.95) !important;
  }

  .panel {
    position: fixed; z-index: 10;
    background: var(--panel); backdrop-filter: blur(18px) saturate(1.3);
    -webkit-backdrop-filter: blur(18px) saturate(1.3);
    border: 1px solid var(--border); border-radius: 14px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .control-panel { top: 20px; left: 20px; padding: 20px 22px; min-width: 320px; max-width: 360px; }
  .control-panel h1 {
    font-size: 17px; font-weight: 700; letter-spacing: 1.5px; margin-bottom: 4px;
    background: linear-gradient(135deg, var(--amber), var(--purple));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; text-transform: uppercase;
  }
  .control-panel .subtitle {
    font-size: 10px; color: var(--text-dim); margin-bottom: 16px;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 1px;
  }
  .file-btn {
    position: relative; display: block; width: 100%; padding: 12px 16px;
    background: linear-gradient(135deg, var(--amber), #e89530);
    color: #1a1208; border-radius: 8px; cursor: pointer;
    text-align: center; font-size: 13px; font-weight: 600;
    transition: all 0.2s ease; overflow: hidden;
    margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.12);
    letter-spacing: 0.5px;
  }
  .file-btn:hover {
    background: linear-gradient(135deg, #ffc866, var(--amber));
    transform: translateY(-1px); box-shadow: 0 4px 20px rgba(255, 184, 74, 0.35);
  }
  .file-btn input { position: absolute; left: -9999px; }
  
  .density-container {
    display: flex; gap: 8px; align-items: center; margin-bottom: 10px;
    background: rgba(0,0,0,0.3); padding: 8px; border-radius: 6px;
    border: 1px solid var(--border);
  }
  .density-container label { font-size: 11px; color: var(--text-mid); flex: 1; font-family: 'JetBrains Mono', monospace; }
  .density-container input {
    width: 70px; padding: 6px; background: rgba(255,255,255,0.05);
    border: 1px solid var(--border-hi); color: var(--text);
    border-radius: 4px; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 13px;
  }
  .trace-btn {
    width: 100%; padding: 10px;
    background: linear-gradient(135deg, var(--purple), #8a2dcc);
    color: #fff; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px; cursor: pointer; font-weight: 600;
    font-size: 13px; letter-spacing: 0.5px; margin-bottom: 10px;
    transition: all 0.2s ease;
  }
  .trace-btn:hover { background: linear-gradient(135deg, #d658ff, var(--purple)); box-shadow: 0 4px 20px rgba(204, 68, 255, 0.35); }
  .trace-btn:active { transform: scale(0.98); }
  
  button {
    background: rgba(74, 158, 255, 0.08); color: var(--text);
    border: 1px solid rgba(74, 158, 255, 0.25);
    padding: 7px 13px; border-radius: 6px; cursor: pointer;
    font-size: 11px; font-weight: 500; font-family: inherit;
    transition: all 0.2s ease; letter-spacing: 0.3px;
  }
  button:hover { background: rgba(74, 158, 255, 0.2); border-color: var(--accent); color: white; }
  button:active { transform: scale(0.96); }
  button.active-test { background: var(--amber); border-color: var(--amber); color: #000; }
  button:disabled { opacity: 0.2; cursor: not-allowed; }
  
  .btn-group { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 10px; }
  
  .status-bar {
    font-size: 11px; color: var(--text-mid); margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; line-height: 1.7;
  }
  .status-bar .label { color: var(--text-dim); }
  .status-bar .value { color: var(--amber); }
  
  .stats-panel { top: 20px; right: 20px; padding: 16px 20px; min-width: 220px; }
  .stats-panel h3 { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; font-family: 'JetBrains Mono', monospace; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 12px; font-family: 'JetBrains Mono', monospace; }
  .stat-label { color: var(--text-mid); }
  .stat-value { color: var(--text); font-weight: 600; min-width: 40px; text-align: right; }
  .stat-value.highlight { color: var(--purple); }
  
  .dpad-container {
    position: fixed; bottom: 20px; left: 50%; z-index: 150;
    transform: translateX(-50%);
    display: grid; grid-template-columns: repeat(3, 32px); grid-template-rows: repeat(3, 32px);
    gap: 3px; background: var(--panel); backdrop-filter: blur(12px);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 5px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .dpad-container .empty { visibility: hidden; }
  .dpad-container button {
    width: 32px; height: 32px; padding: 0; margin: 0;
    font-size: 13px; font-weight: bold; line-height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
  }
  
  .eye-toggle {
    position: fixed; bottom: 20px; right: 20px; z-index: 150;
    width: 48px; height: 48px; background: var(--panel); backdrop-filter: blur(12px);
    border: 1px solid var(--border-hi); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text); box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: transform 0.2s ease, background 0.2s ease;
  }
  .eye-toggle:hover { transform: scale(1.1); background: rgba(74, 158, 255, 0.2); }
  .eye-toggle svg { width: 24px; height: 24px; stroke: var(--text); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

  .toast {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) translateY(30px);
    background: var(--panel); backdrop-filter: blur(16px); padding: 14px 28px; border-radius: 10px;
    border: 1px solid var(--border-hi); color: var(--text); font-size: 14px; font-weight: 500;
    opacity: 0; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); pointer-events: none; z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .toast.show { opacity: 1; transform: translate(-50%, -50%) translateY(0); }
  .toast.success { border-color: var(--success); }
  .toast.error { border-color: var(--danger); }
  .toast.info { border-color: var(--accent); }
  
  #loader { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: flex; align-items: center; justify-content: center; transition: opacity 0.6s; }
  #loader.hidden { opacity: 0; pointer-events: none; }
  .loader-text { font-size: 13px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; letter-spacing: 2px; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

  @media only screen and (max-width: 768px) {
    .panel { backdrop-filter: blur(10px); }
    .control-panel { top: 10px; left: 10px; right: 10px; width: auto; max-width: none; padding: 10px 12px; border-radius: 12px; }
    .control-panel h1 { font-size: 14px; margin-bottom: 2px; }
    .control-panel .subtitle { font-size: 8px; margin-bottom: 6px; }
    .file-btn { padding: 8px; font-size: 11px; margin-bottom: 6px; }
    .density-container { padding: 4px 8px; margin-bottom: 6px; gap: 4px; }
    .density-container label { font-size: 9px; }
    .density-container input { width: 45px; padding: 3px; font-size: 11px; }
    .trace-btn { padding: 7px; font-size: 11px; margin-bottom: 6px; }
    .btn-group { gap: 4px; margin-bottom: 6px; }
    button { padding: 5px 8px; font-size: 9px; }
    .status-bar { font-size: 9px; margin-top: 6px; padding-top: 6px; line-height: 1.4; }
    .status-image, .status-hits { display: none !important; }
    .stats-panel { display: none !important; }
    .toast { font-size: 12px; padding: 10px 20px; width: 80%; max-width: 320px; text-align: center; }
    .loader-text { font-size: 11px; }
  }
</style>
</head>
<body>

<div id="loader"><div class="loader-text">INITIALIZING SCENE...</div></div>

<div class="panel control-panel ui-element">
  <h1>Ray-Trace Studio</h1>
  <div class="subtitle">VECTOR EXPORT SYSTEM</div>
  <label class="file-btn">
    <input type="file" id="imageInput" accept="image/*">
    Load Transparent Image
  </label>
  
  <div class="density-container">
    <label>Max Dimension (cm):</label>
    <input type="number" id="maxSize" value="100" min="20" max="500">
  </div>
  <div class="density-container">
    <label>Rays per cm:</label>
    <input type="number" id="rayDensity" value="10" min="1" max="20">
  </div>
  <button class="trace-btn" id="startTraceBtn">Start Trace Calculation</button>
  
  <div class="btn-group">
    <button id="resetCam">Reset View</button>
    <button id="rotateBtn">Rotate Box</button>
    <button id="toggleMarks">Marks</button>
    <button id="testBtn">Test</button>
  </div>

  <div class="status-bar" id="statusBar">
    <div class="status-image"><span class="label">Image:</span> <span class="value">test-pattern</span></div>
    <div class="status-size"><span class="label">Size:</span> <span class="value">— × —</span></div>
    <div class="status-hits"><span class="label">Hits:</span> <span class="value" id="statusHits">0</span></div>
  </div>
</div>

<div class="panel stats-panel ui-element">
  <h3>Face Hit Distribution</h3>
  <div class="stat-row"><span class="stat-label">Front</span><span class="stat-value" id="stat-front">0</span></div>
  <div class="stat-row"><span class="stat-label">Back</span><span class="stat-value" id="stat-back">0</span></div>
  <div class="stat-row"><span class="stat-label">Left</span><span class="stat-value" id="stat-left">0</span></div>
  <div class="stat-row"><span class="stat-label">Right</span><span class="stat-value" id="stat-right">0</span></div>
  <div style="margin-top:8px; padding-top:8px; border-top:1px solid var(--border)">
    <div class="stat-row"><span class="stat-label">Total Hits</span><span class="stat-value highlight" id="stat-hits">0</span></div>
  </div>
</div>

<div class="dpad-container ui-element">
  <div class="empty"></div><button id="moveUp">↑</button><div class="empty"></div>
  <button id="moveLeft">←</button><button id="moveCenter">⌂</button><button id="moveRight">→</button>
  <div class="empty"></div><button id="moveDown">↓</button><div class="empty"></div>
</div>

<div class="eye-toggle" id="eyeToggle" title="Hide/Show UI">
  <svg viewBox="0 0 24 24">
    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
    <circle cx="12" cy="12" r="3"></circle>
  </svg>
</div>

<div class="toast ui-element" id="toast"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let BOX_X = 15;  
let BOX_Z = 10;  
const BOX_Y = 10;  
let HALF_X = BOX_X / 2;
let HALF_Z = BOX_Z / 2;
const HALF_Y = BOX_Y / 2;
const WALL_SIZE = 300;
const TILE_DIV = WALL_SIZE / 10;
const TILE_SIZE = WALL_SIZE / TILE_DIV;
const MOVE_STEP = TILE_SIZE / 4; 

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x07080d);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
const defaultCamPos = new THREE.Vector3(85, 75, 85);
const defaultCamTarget = new THREE.Vector3(0, 4, 0);
camera.position.copy(defaultCamPos);

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.shadowMap.enabled = false; 
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.copy(defaultCamTarget);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.minDistance = 20; controls.maxDistance = 300;
controls.maxPolarAngle = Math.PI / 2 - 0.02;

const ambientLight = new THREE.AmbientLight(0x4a4a60, 1.0); scene.add(ambientLight);
const keyLight = new THREE.DirectionalLight(0xffffff, 1.5); keyLight.position.set(40, 60, 30); scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0x6088ff, 0.6); fillLight.position.set(-30, 20, -20); scene.add(fillLight);

const wallGeo = new THREE.PlaneGeometry(WALL_SIZE, WALL_SIZE);
const wallMat = new THREE.MeshStandardMaterial({ color: 0x12141e, roughness: 0.95, metalness: 0.05 });
const wall = new THREE.Mesh(wallGeo, wallMat); wall.rotation.x = -Math.PI / 2; scene.add(wall);

const grid = new THREE.GridHelper(WALL_SIZE, TILE_DIV, 0x2a3458, 0x161a28);
grid.position.y = 0.01; grid.material.transparent = true; grid.material.opacity = 0.6; scene.add(grid);

const boxGroup = new THREE.Group();
scene.add(boxGroup);

const markGroup = new THREE.Group();
boxGroup.add(markGroup); 

let cuboidParts = []; 
let faces = [];
let markMeshes = {}; 

function buildCuboid() {
    cuboidParts.forEach(part => { boxGroup.remove(part); if (part.geometry) part.geometry.dispose(); if (part.material) part.material.dispose(); });
    cuboidParts = []; faces = [];
    
    for (const name in markMeshes) {
      markGroup.remove(markMeshes[name]);
      if (markMeshes[name].geometry) markMeshes[name].geometry.dispose();
      if (markMeshes[name].material) {
        if (markMeshes[name].material.map) markMeshes[name].material.map.dispose();
        markMeshes[name].material.dispose();
      }
      delete markMeshes[name];
    }

    HALF_X = BOX_X / 2; HALF_Z = BOX_Z / 2;

    const footprintGeo = new THREE.PlaneGeometry(BOX_X, BOX_Z);
    const footprintMat = new THREE.MeshBasicMaterial({ color: 0x0a0d15, transparent: true, opacity: 0.8 });
    const footprint = new THREE.Mesh(footprintGeo, footprintMat); footprint.rotation.x = -Math.PI / 2; footprint.position.y = 0.02; boxGroup.add(footprint); cuboidParts.push(footprint);

    const boxGeoForEdges = new THREE.BoxGeometry(BOX_X, BOX_Y, BOX_Z);
    const edgesGeo = new THREE.EdgesGeometry(boxGeoForEdges);
    const edgesMat = new THREE.LineBasicMaterial({ color: 0xff8800 });
    const edges = new THREE.LineSegments(edgesGeo, edgesMat);
    edges.position.set(0, HALF_Y, 0);
    boxGroup.add(edges);
    cuboidParts.push(edges);

    const faceDefs = [
      { name: 'front', label: 'FRONT', pos: [0, HALF_Y, HALF_Z],  rotY: 0,           uSize: BOX_X, vSize: BOX_Y },
      { name: 'back',  label: 'BACK',  pos: [0, HALF_Y, -HALF_Z], rotY: Math.PI,     uSize: BOX_X, vSize: BOX_Y },
      { name: 'right', label: 'RIGHT', pos: [HALF_X, HALF_Y, 0],  rotY: -Math.PI/2,  uSize: BOX_Z, vSize: BOX_Y },
      { name: 'left',  label: 'LEFT',  pos: [-HALF_X, HALF_Y, 0], rotY: Math.PI/2,   uSize: BOX_Z, vSize: BOX_Y }
    ];
    faceDefs.forEach(def => {
      const geo = new THREE.PlaneGeometry(def.uSize, def.vSize);
      const mat = new THREE.MeshStandardMaterial({ color: 0x4a90e2, side: THREE.DoubleSide, transparent: true, opacity: 0.12, roughness: 0.2, metalness: 0.3 });
      const mesh = new THREE.Mesh(geo, mat); mesh.position.set(...def.pos); mesh.rotation.y = def.rotY; mesh.userData = { ...def, isFace: true };
      boxGroup.add(mesh); cuboidParts.push(mesh); faces.push(mesh);
      
      const markGeo = new THREE.PlaneGeometry(def.uSize, def.vSize);
      const markMat = new THREE.MeshBasicMaterial({ transparent: true, depthWrite: false, side: THREE.DoubleSide });
      const mMesh = new THREE.Mesh(markGeo, markMat);
      mMesh.position.set(...def.pos); 
      mMesh.rotation.y = def.rotY;
      mMesh.renderOrder = 1; 
      markGroup.add(mMesh);
      markMeshes[def.name] = mMesh;
    });
}
buildCuboid();

const sensor = new THREE.Mesh(new THREE.SphereGeometry(1.3, 32, 32), new THREE.MeshStandardMaterial({ color: 0xff2244, emissive: 0xdd0033, emissiveIntensity: 1.0 }));
sensor.position.set(0, BOX_Y, 0); boxGroup.add(sensor);

const glow1 = new THREE.Mesh(new THREE.SphereGeometry(2.5, 32, 32), new THREE.MeshBasicMaterial({ color: 0xff3355, transparent: true, opacity: 0.15, blending: THREE.AdditiveBlending, depthWrite: false }));
glow1.position.copy(sensor.position); boxGroup.add(glow1);

let imageMesh = null; let imageDims = { w: 0, h: 0 }; let imageCanvas = null; let currentFileName = 'test-pattern'; 
let hasTraced = false;
let isTraceOutdated = false;
let testMode = false;
let wallBakedTexture = null;
let hitPositions = null; 
let hitCount = 0; 

function createDefaultTexture() {
  const c = document.createElement('canvas'); c.width = 1000; c.height = 1000;
  const ctx = c.getContext('2d'); ctx.clearRect(0, 0, 1000, 1000);
  ctx.strokeStyle = 'rgba(255, 100, 100, 0.9)'; ctx.lineWidth = 20; ctx.strokeRect(50, 50, 900, 900);
  ctx.strokeStyle = 'rgba(100, 160, 240, 0.5)'; ctx.lineWidth = 5;
  for (let i = 1; i < 10; i++) { const p = (i/10) * 1000; ctx.beginPath(); ctx.moveTo(p, 50); ctx.lineTo(p, 950); ctx.stroke(); ctx.beginPath(); ctx.moveTo(50, p); ctx.lineTo(950, p); ctx.stroke(); }
  const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace; return { texture: tex, canvas: c };
}

const faceHits = { front: [], back: [], left: [], right: [] };
let marksVisible = true;

const toastEl = document.getElementById('toast'); let toastTimer = null;
function showToast(msg, type = 'info') { toastEl.textContent = msg; toastEl.className = 'toast ui-element show ' + type; clearTimeout(toastTimer); toastTimer = setTimeout(() => { toastEl.className = 'toast ui-element ' + type; }, 3000); }

const imageInput = document.getElementById('imageInput');
imageInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) { showToast('Please select an image file', 'error'); return; }
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      const oc = document.createElement('canvas'); oc.width = img.width; oc.height = img.height;
      const octx = oc.getContext('2d'); octx.drawImage(img, 0, 0);
      const tex = new THREE.CanvasTexture(oc); tex.colorSpace = THREE.SRGBColorSpace;
      loadImageTexture(tex, oc, file.name);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

function loadImageTexture(texture, canvas, fileName = 'test-pattern') {
  if (imageMesh) { scene.remove(imageMesh); imageMesh.geometry.dispose(); imageMesh.material.dispose(); }
  currentFileName = fileName; imageCanvas = canvas; updateImageSize();
  const mat = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide, transparent: true, alphaTest: 0.01, depthWrite: false });
  imageMesh = new THREE.Mesh(new THREE.PlaneGeometry(imageDims.w, imageDims.h), mat);
  imageMesh.rotation.x = -Math.PI / 2; imageMesh.position.y = 0.05; scene.add(imageMesh);
  
  Object.keys(faceHits).forEach(k => faceHits[k] = []);
  bakeMarks(); 
  document.getElementById('stat-hits').textContent = "0";
  updateStatusBar(0);
  hasTraced = false;
  isTraceOutdated = false;
}

function updateImageSize() {
    if (!imageCanvas) return;
    const aspect = imageCanvas.width / imageCanvas.height;
    const maxDim = parseFloat(document.getElementById('maxSize').value) || 100;
    if (aspect >= 1) { imageDims.w = maxDim; imageDims.h = maxDim / aspect; } else { imageDims.h = maxDim; imageDims.w = maxDim * aspect; }
}

function updateStatusBar(totalHits) {
    const displaySize = imageCanvas ? `${imageDims.w.toFixed(1)}cm × ${imageDims.h.toFixed(1)}cm` : '— × —';
    const displayName = currentFileName.length > 18 ? currentFileName.slice(0,15)+'...' : currentFileName;
    document.getElementById('statusBar').innerHTML = `
      <div class="status-image"><span class="label">Image:</span> <span class="value">${displayName}</span></div>
      <div class="status-size"><span class="label">Size:</span> <span class="value">${displaySize}</span></div>
      <div class="status-hits"><span class="label">Hits:</span> <span class="value" id="statusHits">${totalHits.toLocaleString()}</span></div>
    `;
}

document.getElementById('startTraceBtn').addEventListener('click', () => {
  if (!imageCanvas) { showToast('Please load an image first', 'error'); return; }
  updateImageSize();
  if (imageMesh) { imageMesh.geometry.dispose(); imageMesh.geometry = new THREE.PlaneGeometry(imageDims.w, imageDims.h); }
  let density = parseInt(document.getElementById('rayDensity').value);
  if (isNaN(density) || density < 1) density = 1;
  if (density > 20) { density = 20; document.getElementById('rayDensity').value = 18; showToast("Max density is 20 rays/cm", "error"); }
  calculateTrace(density);
});

let isRotated = false;
document.getElementById('rotateBtn').addEventListener('click', () => {
    isRotated = !isRotated;
    if (isRotated) { BOX_X = 10; BOX_Z = 15; } else { BOX_X = 15; BOX_Z = 10; }
    buildCuboid();
    if (hasTraced) {
        isTraceOutdated = true;
    }
});

function moveBox(dx, dz) {
    boxGroup.position.x += dx;
    boxGroup.position.z += dz;
    if (hasTraced) {
        isTraceOutdated = true;
    }
}

document.getElementById('moveUp').addEventListener('click', () => moveBox(0, -MOVE_STEP));
document.getElementById('moveDown').addEventListener('click', () => moveBox(0, MOVE_STEP));
document.getElementById('moveLeft').addEventListener('click', () => moveBox(-MOVE_STEP, 0));
document.getElementById('moveRight').addEventListener('click', () => moveBox(MOVE_STEP, 0));
document.getElementById('moveCenter').addEventListener('click', () => {
    boxGroup.position.set(0, 0, 0);
    if (hasTraced) {
        isTraceOutdated = true;
    }
});

function bakeMarks() {
  const faceDefsMap = {
    'front': { uSize: BOX_X, vSize: BOX_Y },
    'back':  { uSize: BOX_X, vSize: BOX_Y },
    'right': { uSize: BOX_Z, vSize: BOX_Y },
    'left':  { uSize: BOX_Z, vSize: BOX_Y }
  };

  for (const name in faceHits) {
    const hits = faceHits[name];
    const mMesh = markMeshes[name];
    if (!mMesh) continue;
    
    const dims = faceDefsMap[name];
    const c = document.createElement('canvas');
    c.width = 1024; c.height = 1024;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, 1024, 1024);
    
    if (hits.length > 0) {
      ctx.fillStyle = '#cc44ff';
      for (let i = 0; i < hits.length; i += 2) {
        const u = hits[i];
        const v = hits[i + 1];
        const cx = (u / dims.uSize) * 1024;
        const cy = 1024 - (v / dims.vSize) * 1024;
        ctx.beginPath();
        ctx.arc(cx, cy, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    if (mMesh.material.map) {
      mMesh.material.map.dispose();
    }
    const tex = new THREE.CanvasTexture(c);
    tex.colorSpace = THREE.SRGBColorSpace;
    mMesh.material.map = tex;
    mMesh.material.needsUpdate = true;
    mMesh.userData.bakedCanvas = c; // ذخیره کردن کانوس برای خروجی SVG
  }
}

function bakeShadows() {
    const canvasSize = 2048;
    const c = document.createElement('canvas');
    c.width = canvasSize; c.height = canvasSize;
    const ctx = c.getContext('2d');
    
    ctx.fillStyle = '#07080d';
    ctx.fillRect(0, 0, canvasSize, canvasSize);

    const boxX = boxGroup.position.x;
    const boxZ = boxGroup.position.z;
    const Ly = 10; 
    const scale = canvasSize / WALL_SIZE;
    
    const lightCx = (boxX + WALL_SIZE / 2) * scale;
    const lightCy = (WALL_SIZE / 2 + boxZ) * scale; 
    const lightRadius = 400 * scale; 

    const grad = ctx.createRadialGradient(lightCx, lightCy, 0, lightCx, lightCy, lightRadius);
    grad.addColorStop(0, '#ffdd00');
    grad.addColorStop(0.9, '#ffdd00');
    grad.addColorStop(1, 'rgba(255, 221, 0, 0)');
    
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(lightCx, lightCy, lightRadius, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#000000';
    ctx.globalAlpha = 0.8;
    
    if (hitPositions && hitCount > 0) {
        for (let i = 0; i < hitCount; i++) {
            const X = hitPositions[i * 3];
            const Y = hitPositions[i * 3 + 1];
            const Z = hitPositions[i * 3 + 2];
            
            if (Y >= Ly - 0.1) continue; 
            
            const t = Ly / (Ly - Y);
            const ProjX = boxX + t * (X - boxX);
            const ProjZ = boxZ + t * (Z - boxZ);
            
            const cx = (ProjX + WALL_SIZE / 2) * scale;
            const cy = (WALL_SIZE / 2 + ProjZ) * scale; 
            
            const radius = Math.max(2, 0.04 * t * scale); 
            
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.fill();
        }
    }
    ctx.globalAlpha = 1.0;
    
    if (!wallBakedTexture) {
        wallBakedTexture = new THREE.CanvasTexture(c);
        wallBakedTexture.colorSpace = THREE.SRGBColorSpace;
    } else {
        wallBakedTexture.image = c;
        wallBakedTexture.needsUpdate = true;
    }
    
    if (wall.material.type !== 'MeshBasicMaterial') {
        wall.material.dispose();
        wall.material = new THREE.MeshBasicMaterial({ map: wallBakedTexture });
    } else {
        wall.material.map = wallBakedTexture;
        wall.material.needsUpdate = true;
    }
}

function applyTestModeVisuals(isTest) {
    if (isTest) {
        if (imageMesh) imageMesh.visible = false;
        
        ambientLight.intensity = 0;
        keyLight.intensity = 0;
        fillLight.intensity = 0;

        sensor.material.emissive.setHex(0xffdd00);
        sensor.material.emissiveIntensity = 3.0;

        marksVisible = false; 
        markGroup.visible = false;
        document.getElementById('toggleMarks').style.opacity = '0.4';
        document.getElementById('toggleMarks').disabled = true;

        faces.forEach(f => {
            f.material.opacity = 0.0; 
            f.material.color.setHex(0x000000);
            f.material.emissive.setHex(0x000000);
        });

        grid.visible = false;
        
        bakeShadows();
    } else {
        if (imageMesh) imageMesh.visible = true;
        
        ambientLight.intensity = 1.0;
        keyLight.intensity = 1.5;
        fillLight.intensity = 0.6;

        sensor.material.emissive.setHex(0xdd0033);

        document.getElementById('toggleMarks').disabled = false;

        faces.forEach(f => {
            f.material.opacity = 0.12;
            f.material.color.setHex(0x4a90e2);
            f.material.emissive.setHex(0x000000);
        });

        if (wall.material.type !== 'MeshStandardMaterial') {
            wall.material.dispose();
            wall.material = new THREE.MeshStandardMaterial({ color: 0x12141e, roughness: 0.95, metalness: 0.05 });
        }

        grid.visible = true;
    }
}

document.getElementById('testBtn').addEventListener('click', (e) => {
    testMode = !testMode;
    e.target.classList.toggle('active-test', testMode);

    if (testMode) {
        if (!hasTraced) {
            if (!imageCanvas) {
                showToast('Please load an image first', 'error');
                testMode = false;
                e.target.classList.remove('active-test');
                return;
            }
            let density = parseInt(document.getElementById('rayDensity').value) || 10;
            if (density > 18) density = 18;
            
            applyTestModeVisuals(true);
            calculateTrace(density); 
        } else {
            applyTestModeVisuals(true); 
        }
    } else {
        applyTestModeVisuals(false);
    }
});

let isUIHidden = false;
const eyeToggle = document.getElementById('eyeToggle');
const eyeOpenSVG = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>`;
const eyeClosedSVG = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>`;

eyeToggle.addEventListener('click', () => {
    isUIHidden = !isUIHidden;
    document.body.classList.toggle('hide-ui', isUIHidden);
    eyeToggle.querySelector('svg').innerHTML = isUIHidden ? eyeClosedSVG : eyeOpenSVG;
});

function calculateTrace(density) {
  Object.keys(faceHits).forEach(k => faceHits[k] = []);
  document.getElementById('loader').classList.remove('hidden');
  document.getElementById('loader').querySelector('.loader-text').textContent = `TRACING ${density} RAYS/CM...`;

  setTimeout(() => {
    try {
      const boxX = boxGroup.position.x;
      const boxZ = boxGroup.position.z;
      const ctx = imageCanvas.getContext('2d');
      const imgData = ctx.getImageData(0, 0, imageCanvas.width, imageCanvas.height).data;
      const maxRaysPerSide = 3000;
      let numX = Math.max(2, Math.round(imageDims.w * density));
      let numZ = Math.max(2, Math.round(imageDims.h * density));
      if (numX > maxRaysPerSide) numX = maxRaysPerSide;
      if (numZ > maxRaysPerSide) numZ = maxRaysPerSide;
      const stepPxX = imageCanvas.width / numX; const stepPxY = imageCanvas.height / numZ;

      const maxHits = numX * numZ;
      hitPositions = new Float32Array(maxHits * 3); 
      hitCount = 0; 
      const sensorX = boxX, sensorY = 10, sensorZ = boxZ; 
      const startY = 0.08;

      for(let i=0; i<numX; i++) {
        const px = Math.floor(i * stepPxX);
        const u = (i / (numX - 1)) * 2 - 1; const sx = u * (imageDims.w / 2);
        for(let j=0; j<numZ; j++) {
          const py = Math.floor(j * stepPxY);
          const idx = (py * imageCanvas.width + px) * 4; const alpha = imgData[idx + 3];
          const v = (j / (numZ - 1)) * 2 - 1; const sz = v * (imageDims.h / 2);

          if (alpha > 128 && (Math.abs(sx - boxX) > HALF_X + 0.01 || Math.abs(sz - boxZ) > HALF_Z + 0.01)) {
            
            const dirX = sensorX - sx; const dirY = sensorY - startY; const dirZ = sensorZ - sz;
            let bestT = 2; let hitFace = null, hitU = 0, hitV = 0, hitX = 0, hitY = 0, hitZ = 0;

            if (dirZ !== 0) {
              const t = (boxZ + HALF_Z - sz) / dirZ;
              if (t > 0.001 && t < bestT) {
                const hx = sx + dirX * t; const hy = startY + dirY * t;
                if (Math.abs(hx - boxX) <= HALF_X && hy >= 0 && hy <= BOX_Y) { 
                  bestT = t; hitFace = 'front'; hitU = (hx - boxX) + HALF_X; hitV = hy; hitX = hx; hitY = hy; hitZ = boxZ + HALF_Z; 
                }
              }
              const t2 = (boxZ - HALF_Z - sz) / dirZ;
              if (t2 > 0.001 && t2 < bestT) {
                const hx = sx + dirX * t2; const hy = startY + dirY * t2;
                if (Math.abs(hx - boxX) <= HALF_X && hy >= 0 && hy <= BOX_Y) { 
                  bestT = t2; hitFace = 'back'; hitU = -(hx - boxX) + HALF_X; hitV = hy; hitX = hx; hitY = hy; hitZ = boxZ - HALF_Z; 
                }
              }
            }
            if (dirX !== 0) {
              const t = (boxX + HALF_X - sx) / dirX;
              if (t > 0.001 && t < bestT) {
                const hz = sz + dirZ * t; const hy = startY + dirY * t;
                if (Math.abs(hz - boxZ) <= HALF_Z && hy >= 0 && hy <= BOX_Y) { 
                  bestT = t; hitFace = 'right'; hitU = -(hz - boxZ) + HALF_Z; hitV = hy; hitX = boxX + HALF_X; hitY = hy; hitZ = hz; 
                }
              }
              const t2 = (boxX - HALF_X - sx) / dirX;
              if (t2 > 0.001 && t2 < bestT) {
                const hz = sz + dirZ * t2; const hy = startY + dirY * t2;
                if (Math.abs(hz - boxZ) <= HALF_Z && hy >= 0 && hy <= BOX_Y) { 
                  bestT = t2; hitFace = 'left'; hitU = (hz - boxZ) + HALF_Z; hitV = hy; hitX = boxX - HALF_X; hitY = hy; hitZ = hz; 
                }
              }
            }

            if (hitFace) {
              const hIdx = hitCount * 3;
              hitPositions[hIdx] = hitX; hitPositions[hIdx+1] = hitY; hitPositions[hIdx+2] = hitZ;
              hitCount++;
              faceHits[hitFace].push(hitU, hitV);
            }
          }
        }
      }

      bakeMarks();

      document.getElementById('stat-front').textContent = (faceHits.front.length / 2).toLocaleString();
      document.getElementById('stat-back').textContent = (faceHits.back.length / 2).toLocaleString();
      document.getElementById('stat-left').textContent = (faceHits.left.length / 2).toLocaleString();
      document.getElementById('stat-right').textContent = (faceHits.right.length / 2).toLocaleString();
      document.getElementById('stat-hits').textContent = hitCount.toLocaleString();
      updateStatusBar(hitCount);
      hasTraced = true;
      isTraceOutdated = false; 

      if (testMode) {
          bakeShadows();
      }
    } catch(e) {
      console.error(e);
      showToast("Error during tracing. Try lower density.", "error");
    } finally {
      document.getElementById('loader').classList.add('hidden');
    }
  }, 50);
}

const raycaster = new THREE.Raycaster(); const mouse = new THREE.Vector2();
let hoveredFace = null, mouseDownPos = null, mouseDownTime = 0;

renderer.domElement.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(faces);
  if (hits.length > 0) {
    const f = hits[0].object;
    if (hoveredFace !== f) { if (hoveredFace) { hoveredFace.material.opacity = testMode ? 0.0 : 0.12; } hoveredFace = f; f.material.opacity = 0.3; renderer.domElement.style.cursor = 'pointer'; }
  } else {
    if (hoveredFace) { hoveredFace.material.opacity = testMode ? 0.0 : 0.12; hoveredFace = null; renderer.domElement.style.cursor = 'default'; }
  }
});

renderer.domElement.addEventListener('mousedown', (e) => { mouseDownPos = { x: e.clientX, y: e.clientY }; mouseDownTime = Date.now(); });
renderer.domElement.addEventListener('mouseup', (e) => {
  if (!mouseDownPos) return;
  const dx = e.clientX - mouseDownPos.x, dy = e.clientY - mouseDownPos.y; const dist = Math.hypot(dx, dy), dt = Date.now() - mouseDownTime;
  mouseDownPos = null; if (dist > 5 || dt > 500) return;
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(faces);
  if (hits.length > 0) {
    if (isTraceOutdated) {
      showToast('رندر قدیمی است! لطفاً دکمه ثبت را فشار دهید', 'error');
      return;
    }
    exportFaceAsSVG(hits[0].object);
  }
});

// ============ Vector Export (Robust Image Embed) ============
function exportFaceAsSVG(face) {
  const def = face.userData; const name = def.name;
  const uSize = def.uSize; const vSize = def.vSize; 

  const pad = 0.1; const vbW = uSize + pad * 2; const vbH = vSize + pad * 2;
  const scale = 50; const pxW = vbW * scale; const pxH = vbH * scale;
  
  const mMesh = markMeshes[name];
  if (!mMesh || !mMesh.userData.bakedCanvas) {
      showToast('No marks to export', 'error');
      return;
  }

  // تبدیل مستقیم تصویر جامد Bake شده به Base64 برای قرار گرفتن در SVG
  const dataURL = mMesh.userData.bakedCanvas.toDataURL('image/png');
  
  const parts = [];
  parts.push(`<svg xmlns="http://www.w3.org/2000/svg" width="${pxW}" height="${pxH}" viewBox="${-pad} ${-pad} ${vbW} ${vbH}" overflow="hidden">`);
  parts.push(`<rect x="0" y="0" width="${uSize}" height="${vSize}" fill="none" stroke="#4a90e2" stroke-width="0.05"/>`);
  // درج مستقیم تصویر جامد ۲ بعدی در وکتور
  parts.push(`<image href="${dataURL}" x="0" y="0" width="${uSize}" height="${vSize}" preserveAspectRatio="none"/>`);
  parts.push(`</svg>`);

  const blob = new Blob(parts, { type: "image/svg+xml;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `face-${name}-vector-${Date.now()}.svg`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

document.getElementById('resetCam').addEventListener('click', () => {
  const start = camera.position.clone(); const startT = controls.target.clone(); const t0 = performance.now(); const dur = 600;
  function step() {
    const t = Math.min(1, (performance.now() - t0) / dur); const e = 1 - Math.pow(1 - t, 3);
    camera.position.lerpVectors(start, defaultCamPos, e); controls.target.lerpVectors(startT, defaultCamTarget, e);
    if (t < 1) requestAnimationFrame(step);
  }
  step();
});

document.getElementById('toggleMarks').addEventListener('click', (e) => {
  marksVisible = !marksVisible; 
  markGroup.visible = marksVisible; 
  e.target.style.opacity = marksVisible ? '1' : '0.4';
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

let time = 0;
function animate() {
  requestAnimationFrame(animate); time += 0.016; controls.update();
  const pulse = 1 + Math.sin(time * 2.5) * 0.08;
  glow1.scale.setScalar(pulse); 
  
  if (testMode) {
    sensor.material.emissiveIntensity = 3.0;
  } else {
    sensor.material.emissiveIntensity = 0.9 + Math.sin(time * 3) * 0.2;
  }
  
  renderer.render(scene, camera);
}

const defaultTex = createDefaultTexture();
loadImageTexture(defaultTex.texture, defaultTex.canvas, 'test-pattern');
animate();
setTimeout(() => { document.getElementById('loader').classList.add('hidden'); }, 300);
